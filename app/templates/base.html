<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cricket Manager{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/styles.css') }}?v=1" rel="stylesheet">

    <!-- NEW: Desktop enhancement CSS (must be AFTER main CSS) -->
    <!-- <link href="{{ url_for('static', path='css/desktopstyles.css') }}" rel="stylesheet"> -->
</head>
<body>

    <!-- Navbar -->
    <!-- <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">Cricket Manager</a>

            <div class="ms-auto">
                <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
            </div>
        </div>
    </nav> -->
    <nav class="navbar navbar-dark bg-dark px-3">
    <button class="btn btn-outline-light me-2" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar">
        ☰
    </button>

    <a class="navbar-brand fw-bold" href="/">30 Yard Cricket</a>

    <div class="ms-auto">
        <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
    </div>
</nav>

    <div class="container-fluid">
        <div class="row min-vh-100">
            
            <!-- Sidebar -->
            <!-- <aside class="col-md-2 col-lg-2 bg-light border-end p-3"> -->
                <div class="col-md-2 col-lg-2 collapse" id="sidebar">
                <aside class="bg-light border-end p-3 h-100">
                <h6 class="text-muted mb-3">Menu</h6>
                <div class="list-group list-group-flush">
                    <a href="/tournaments" class="list-group-item list-group-item-action">Tournaments</a>
                    <a href="/teams" class="list-group-item list-group-item-action">Teams</a>
                    <a href="/matches/new" class="list-group-item list-group-item-action">New Match</a>
                    <a href="/match-history" class="list-group-item list-group-item-action">Match History</a>
                    <a href="/live-match" class="list-group-item list-group-item-action">Live Match</a>
                    <a href="/admin" class="list-group-item list-group-item-action">Admin</a>
                    <a href="/official-rules" class="list-group-item list-group-item-action">Official Rules</a>
                </div>
            </aside>
                </div>
            <!-- Main Content -->
            <main class="col-md-10 col-lg-10 p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
</body>
</html>
