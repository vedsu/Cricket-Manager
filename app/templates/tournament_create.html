{% extends "base.html" %}

{% block title %}Create Tournament{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <a href="/tournaments" class="btn btn-dark btn-sm">Back</a>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="fw-bold mb-3">Create Tournament</h2>

        <form action="/tournaments/create" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Tournament Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter tournament name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date (dd-mm-yyyy)</label>
                <input type="date" name="match_date" class="form-control" placeholder="31-03-2026" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tournament Logo</label>
                <input type="file" name="logo" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-dark">Save Tournament</button>
        </form>
    </div>
</div>
{% endblock %}
